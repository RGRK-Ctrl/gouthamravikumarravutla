<script src="script.js"></script>
<script>
/* Content is loaded from data.json — do not hand-edit here.
   Add entries with your local admin form (admin.html). */
let DATA = { blogTopics:[], blogs:[], projects:[] };
function srcBadge(src){
  const s = src || 'Link';
  const k = s.toLowerCase();
  const cls = k.includes('linkedin') ? 'linkedin'
    : k.includes('medium') ? 'medium'
    : k.includes('substack') ? 'substack'
    : k.includes('dev.to')||k.includes('devto') ? 'devto'
    : k.includes('youtube') ? 'youtube' : 'generic';
  const safe = s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<span class="src ${cls}">${safe} &#8599;</span>`;
}

document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.tabpanel').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('panel-' + t.dataset.tab).classList.add('active');
});

const bf = document.getElementById('blog-filters');
const bg = document.getElementById('blog-groups');
let blogActive = "all";
function renderBlogs(){
  const chips = [{id:"all",name:"All"}, ...DATA.blogTopics];
  bf.innerHTML = chips.map(c => `<button class="chip ${c.id===blogActive?'active':''}" data-id="${c.id}">${c.name}</button>`).join('');
  bf.querySelectorAll('.chip').forEach(b => b.onclick = () => { blogActive=b.dataset.id; renderBlogs(); });
  const topics = DATA.blogTopics.filter(t => blogActive==="all" || t.id===blogActive);
  let html = "";
  topics.forEach(t => {
    const items = DATA.blogs.filter(x => x.topic===t.id);
    if(!items.length) return;
    html += `<div class="pillar"><div class="pillar-head"><h2>${t.name}</h2><span class="count">${items.length} post${items.length!==1?'s':''}</span></div><div class="link-list">`;
    items.forEach(x => {
      html += `<a class="link-item" href="${x.url}" target="_blank" rel="noopener"><span class="li-main"><h3>${x.title} <span>${srcBadge(x.source)}</span></h3><p>${x.blurb}</p></span></a>`;
    });
    html += `</div></div>`;
  });
  bg.innerHTML = html || `<p class="empty">No posts yet.</p>`;
}

const pf = document.getElementById('proj-filters');
const pl = document.getElementById('proj-list');
let projActive = "all";
function renderProjects(){
  const chips = [{name:"All"}, ...DATA.projects.map(p => ({name:p.name}))];
  pf.innerHTML = chips.map(c => {
    const val = c.name==='All'?'all':c.name;
    return `<button class="chip ${val===projActive?'active':''}" data-name="${val}">${c.name}</button>`;
  }).join('');
  pf.querySelectorAll('.chip').forEach(b => b.onclick = () => { projActive=b.dataset.name; renderProjects(); });
  const items = DATA.projects.filter(p => projActive==="all" || p.name===projActive);
  pl.innerHTML = items.map(p => {
    const badge = p.link ? `<span class="src ${p.link.toLowerCase()==='linkedin'?'linkedin':'onsite'}">${p.link}${p.external?' &#8599;':''}</span>` : '';
    const nameTag = p.url ? `<a href="${p.url}"${p.external?' target="_blank" rel="noopener"':''} style="color:inherit">${p.name} ${badge}</a>` : `${p.name} ${badge}`;
    let arts = "";
    if(p.articles && p.articles.length){
      arts = `<h4 style="font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:18px 0 10px">Related articles</h4><div class="link-list">` +
        p.articles.map(a => `<a class="link-item" href="${a.url}" target="_blank" rel="noopener"><span class="li-main"><h3>${a.title} <span>${srcBadge(a.source)}</span></h3><p>${a.blurb}</p></span></a>`).join('') + `</div>`;
    }
    return `<div class="pillar"><div class="pillar-head"><h2>${nameTag}</h2><span class="count">${p.year} &middot; ${p.type}</span></div><p class="desc">${p.blurb}</p>${arts}</div>`;
  }).join('');
}

fetch('data.json?' + Date.now())
  .then(r => r.json())
  .then(d => { DATA = d; renderBlogs(); renderProjects(); })
  .catch(() => { bg.innerHTML = `<p class="empty">Couldn&rsquo;t load content. (This works once the site is live on GitHub Pages.)</p>`; });
</script>
