<body>

<nav class="nav">
  <div class="wrap">
    <a href="index.html" class="brand">Goutham<span>.</span></a>
    <button class="menu-toggle" aria-label="Menu" aria-expanded="false">&#9776;</button>
    <div class="navlinks" id="nav">

      <a href="work.html">Work</a>
      <a href="contact.html" class="btn">Get in touch</a>
    </div>
  </div>
</nav>

<header class="hero" id="top">
  <div class="wrap">
    <p class="eyebrow" id="h-role">&nbsp;</p>
    <h1 id="h-headline">&nbsp;</h1>
    <p class="lede" id="h-lede"></p>
    <div class="cta-row">
      <a href="work.html" class="btn">See my work</a>
      <a id="h-resume" class="btn ghost" target="_blank" rel="noopener">Résumé</a>
    </div>
  </div>
</header>

<section id="about">
  <div class="wrap">
    <div class="section-head">
      <p class="eyebrow">About</p>
      <h2 id="a-heading">&nbsp;</h2>
    </div>
    <div class="about-grid">
      <div id="a-paras"></div>
      <dl class="facts" id="a-facts"></dl>
    </div>
  </div>
</section>

<footer>
  <div class="wrap">
    <span>&copy; <span id="year"></span> Goutham Ravi Kumar Ravutla. All rights reserved.</span>
    <span><a id="f-linkedin" target="_blank" rel="noopener">LinkedIn</a> &middot; <a id="f-email">Email</a></span>
  </div>
</footer>

<script src="script.js"></script>
<script>
fetch('data.json?' + Date.now()).then(r => r.json()).then(d => {
  const p = d.profile || {}, a = d.about || {};
  document.getElementById('h-role').textContent = p.role || '';
  document.getElementById('h-headline').textContent = p.headline || '';
  document.getElementById('h-lede').textContent = p.lede || '';
  const rz = document.getElementById('h-resume'); rz.href = p.resumeUrl || '#';
  document.getElementById('a-heading').textContent = a.heading || '';
  document.getElementById('a-paras').innerHTML = (a.paragraphs || []).map(t => `<p>${t}</p>`).join('');
  document.getElementById('a-facts').innerHTML = (a.facts || []).map(f => `<dt>${f.label}</dt><dd>${f.value}</dd>`).join('');
  const li = document.getElementById('f-linkedin'); li.href = p.linkedin || '#';
  const em = document.getElementById('f-email'); em.href = 'mailto:' + (p.email || '');
}).catch(()=>{});
</script>
</body>
