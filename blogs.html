<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<body>

<nav class="nav">
  <div class="wrap">
    <a href="index.html" class="brand">Goutham<span>.</span></a>
    <button class="menu-toggle" aria-label="Menu" aria-expanded="false">&#9776;</button>
    <div class="navlinks" id="nav">

      <a href="contact.html" class="btn">Get in touch</a>

<header class="page-head">
  <div class="wrap">
    <p class="eyebrow">Blogs</p>
    <h1>Writing, published on LinkedIn.</h1>
    <p class="lede">Each card links straight to the full article on LinkedIn.</p>
  </div>
</header>

<section style="padding-top:36px">
  <div class="wrap">
    <div class="posts" id="posts"></div>
  </div>
</section>

<footer>
  <div class="wrap">
    <span>&copy; <span id="year"></span> Goutham Ravi Kumar Ravutla.</span>
    <span><a href="index.html">Home</a></span>
  </div>
</footer>

<script src="script.js"></script>
<script>
/* =========================================================
   BLOGS DATA  —  the only thing you edit.

   TO ADD A LINKEDIN BLOG: copy the block below, paste it at the
   top of the list, and fill in the four fields. Newest first.

     {
       title: "Your article title",
       url:   "https://www.linkedin.com/pulse/your-article-slug",
       tag:   "Product Management",
       blurb: "One or two lines summarising the article."
     },
   ========================================================= */
const BLOGS = [
  {
    title: "[Your LinkedIn article title]",
    url:   "[LINKEDIN_ARTICLE_URL_1]",
    tag:   "AI",
    blurb: "[One-line summary of the article.]"
  },
  {
    title: "[Your LinkedIn article title]",
    url:   "[LINKEDIN_ARTICLE_URL_2]",
    tag:   "Product Management",
    blurb: "[One-line summary of the article.]"
  },
  {
    title: "[Your LinkedIn article title]",
    url:   "[LINKEDIN_ARTICLE_URL_3]",
    tag:   "UX Laws",
    blurb: "[One-line summary of the article.]"
  }
];
/* ========================================================= */

document.getElementById('posts').innerHTML = BLOGS.map(b => `
  <a class="post-card" href="${b.url}" target="_blank" rel="noopener">
    <div class="meta">${b.tag} &middot; <span class="src linkedin">LinkedIn &#8599;</span></div>
    <h3>${b.title}</h3>
    <p>${b.blurb}</p>
    <span class="readmore">Read on LinkedIn &rarr;</span>
  </a>`).join('');
</script>
</body>
</html>
