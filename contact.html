    <div class="cta-row">
      <a id="c-email" class="btn">Email me</a>
      <a id="c-linkedin" class="btn ghost" target="_blank" rel="noopener">LinkedIn</a>

<script src="script.js"></script>
<script>
fetch('data.json?' + Date.now()).then(r => r.json()).then(d => {
  const p = d.profile || {}, c = d.contact || {};
  document.getElementById('c-heading').textContent = c.heading || '';
  document.getElementById('c-text').textContent = c.text || '';
  document.getElementById('c-email').href = 'mailto:' + (p.email || '');
  document.getElementById('c-linkedin').href = p.linkedin || '#';
  document.getElementById('c-foot').textContent = [p.email, p.location].filter(Boolean).join(' · ');
}).catch(()=>{});
</script>
