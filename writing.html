<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Writing &amp; Projects · Goutham</title>
<meta name="description" content="Product writing grouped by topic and project — essays, case notes, and LinkedIn articles.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="nav">
  <div class="wrap">
    <a href="index.html" class="brand">Goutham<span>.</span></a>
    <button class="menu-toggle" aria-label="Menu" aria-expanded="false">☰</button>
    <div class="navlinks" id="nav">
      <a href="index.html#about">About</a>
      <a href="index.html#work">Work</a>
      <a href="writing.html">Writing</a>
      <a href="index.html#contact" class="btn">Get in touch</a>
    </div>
  </div>
</nav>

<header class="hero" style="padding-bottom:40px">
  <div class="wrap">
    <p class="eyebrow">Writing &amp; Projects</p>
    <h1 style="font-size:clamp(34px,5vw,52px)">Everything I've written, sorted by what it's about.</h1>
    <p class="lede">On-site essays and my LinkedIn articles, grouped by topic and project so you can jump straight to what's relevant.</p>
  </div>
</header>

<section style="border-top:1px solid var(--line);padding-top:48px">
  <div class="wrap">
    <div class="filters" id="filters"><!-- chips injected --></div>
    <div id="groups"><!-- groups injected --></div>
  </div>
</section>

<footer>
  <div class="wrap">
    <span>© <span id="year"></span> Goutham.</span>
    <span><a href="index.html">Home</a></span>
  </div>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

/* =========================================================
   EDIT HERE — this is the only thing you touch to add posts.
   - topic: the group/project it belongs to (create as many as you like)
   - source: "linkedin" or "onsite"
   - url: LinkedIn article URL, or on-site file like "blog/prioritization.html"
   - external: true opens in a new tab (use for LinkedIn)
   ========================================================= */
const TOPICS = [
  { id:"ai",     name:"Enterprise AI Products", desc:"Shipping, governing, and driving adoption of AI features." },
  { id:"proc",   name:"Product Craft &amp; Process", desc:"Prioritization, discovery, and how decisions get made." },
  { id:"data",   name:"Data &amp; Analytics",        desc:"Turning data products into things people trust." },
  { id:"career", name:"PM Career Notes",         desc:"Interviewing, growth, and lessons from the role." }
];

const POSTS = [
  { topic:"ai",     source:"onsite",   external:false, url:"blog/shipping-ai.html",
    title:"The demo is easy. Adoption is the product.", meta:"8 min",
    blurb:"Why enterprise AI features die between demo and trusted workflow." },
  { topic:"proc",   source:"onsite",   external:false, url:"blog/prioritization.html",
    title:"RICE won't tell you what to build", meta:"6 min",
    blurb:"Scoring frameworks are a conversation tool, not a decision oracle." },

  /* ---- Your LinkedIn articles: replace url/title/blurb, add as many as you want ---- */
  { topic:"ai",     source:"linkedin", external:true, url:"[LINKEDIN_ARTICLE_URL_1]",
    title:"[Your LinkedIn article title]", meta:"LinkedIn",
    blurb:"[One-line summary of the article.]" },
  { topic:"data",   source:"linkedin", external:true, url:"[LINKEDIN_ARTICLE_URL_2]",
    title:"[Your LinkedIn article title]", meta:"LinkedIn",
    blurb:"[One-line summary of the article.]" },
  { topic:"career", source:"linkedin", external:true, url:"[LINKEDIN_ARTICLE_URL_3]",
    title:"[Your LinkedIn article title]", meta:"LinkedIn",
    blurb:"[One-line summary of the article.]" }
];
/* ========================================================= */

const filtersEl = document.getElementById('filters');
const groupsEl  = document.getElementById('groups');
let active = "all";

function render(){
  // chips
  const chips = [{id:"all",name:"All"}, ...TOPICS];
  filtersEl.innerHTML = chips.map(c =>
    `<button class="chip ${c.id===active?'active':''}" data-id="${c.id}">${c.name}</button>`
  ).join('');
  filtersEl.querySelectorAll('.chip').forEach(b =>
    b.onclick = () => { active = b.dataset.id; render(); });

  // groups
  const shown = TOPICS.filter(t => active==="all" || t.id===active);
  let html = "";
  shown.forEach(t => {
    const posts = POSTS.filter(p => p.topic===t.id);
    if(!posts.length) return;
    html += `<div class="topic-group"><h2>${t.name}</h2><p class="desc">${t.desc}</p><div class="link-list">`;
    posts.forEach(p => {
      const badge = p.source==="linkedin"
        ? `<span class="src linkedin">LinkedIn ↗</span>`
        : `<span class="src onsite">On-site</span>`;
      const tgt = p.external ? ` target="_blank" rel="noopener"` : "";
      html += `<a class="link-item" href="${p.url}"${tgt}>
        <span class="li-main"><h3>${p.title} ${badge}</h3><p>${p.blurb}</p></span>
        <span class="li-meta">${p.meta}</span></a>`;
    });
    html += `</div></div>`;
  });
  groupsEl.innerHTML = html || `<p class="empty">No posts in this topic yet.</p>`;
}
render();

// mobile nav
const t = document.querySelector('.menu-toggle'), n = document.getElementById('nav');
if(t) t.onclick = () => { const o = n.classList.toggle('open'); t.setAttribute('aria-expanded',o); };
</script>
</body>
</html>
